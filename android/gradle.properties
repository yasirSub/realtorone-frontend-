org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Work around Kotlin incremental cache issues on Windows when sources live on a different drive
# than the Pub cache (different roots). This avoids daemon/incremental cache close failures.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
